name: Release APK

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Inject Supabase config
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute versionCode
        id: vcode
        run: |
          V="${{ steps.version.outputs.VERSION }}"
          IFS='.' read -r MA MI PA <<EOF
          ${V}
          EOF
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          CODE=$(( MA*10000 + MI*100 + PA ))
          echo "CODE=${CODE}" >> $GITHUB_OUTPUT

      - name: Build release APK
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionName=${{ steps.version.outputs.VERSION }} -PversionCode=${{ steps.vcode.outputs.CODE }}

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             UberAutoAccept-${{ steps.version.outputs.VERSION }}.apk

      - name: Prepare Shizuku APK
        run: |
          cp shizuku-v13.6.0.apk Shizuku.apk
          echo "SHIZUKU_DOWNLOADED=true" >> $GITHUB_ENV

      - name: Upload APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Upload app APK
          curl -X POST \
            "${SUPABASE_URL}/storage/v1/object/apks/UberAutoAccept-${VERSION}.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @UberAutoAccept-${VERSION}.apk

          # Upload Shizuku APK (if downloaded)
          if [ "$SHIZUKU_DOWNLOADED" = "true" ]; then
            curl -X POST \
              "${SUPABASE_URL}/storage/v1/object/apks/Shizuku.apk" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @Shizuku.apk
          fi

      - name: Insert release record to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          VERSION_CODE=${{ steps.vcode.outputs.CODE }}
          CHANGELOG=$(git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "HEAD~20")..HEAD --no-merges | head -20)

          SHIZUKU_PATH=""
          if [ "$SHIZUKU_DOWNLOADED" = "true" ]; then
            SHIZUKU_PATH="Shizuku.apk"
          fi

          curl --fail-with-body -X POST \
            "${SUPABASE_URL}/rest/v1/apk_releases" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"version_name\": \"${VERSION}\",
              \"version_code\": ${VERSION_CODE},
              \"app_download_path\": \"UberAutoAccept-${VERSION}.apk\",
              \"shizuku_download_path\": \"${SHIZUKU_PATH}\",
              \"shizuku_version\": \"13.6.0\",
              \"changelog\": $(echo "$CHANGELOG" | jq -Rs .)
            }"

      - name: Generate changelog file
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --oneline ${PREV_TAG}..HEAD --no-merges > changelog.txt
          else
            git log --oneline -20 --no-merges > changelog.txt
          fi
          if [ -f .github/release_notes/BEFORE_AFTER.md ]; then
            printf "\n\n" >> changelog.txt
            cat .github/release_notes/BEFORE_AFTER.md >> changelog.txt
          fi

      - name: Create GitHub Release (with before/after)
        uses: softprops/action-gh-release@v2
        with:
          name: "UberAutoAccept v${{ steps.version.outputs.VERSION }}"
          body_path: changelog.txt
          files: |
            UberAutoAccept-${{ steps.version.outputs.VERSION }}.apk
            Shizuku.apk
