<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UberAutoAccept 다운로드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #16213e; border-radius: 16px; padding: 32px; width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
h1 { font-size: 20px; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; margin-top: 16px; }
input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f3460; color: #fff; font-size: 16px; outline: none; }
input:focus { border-color: #e94560; }
button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #e94560; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 24px; }
button:disabled { background: #555; cursor: not-allowed; }
button:hover:not(:disabled) { background: #c73650; }
.msg { text-align: center; margin-top: 16px; font-size: 14px; min-height: 20px; }
.msg.ok { color: #4CAF50; }
.msg.err { color: #e94560; }
.downloads { margin-top: 20px; display: none; }
.dl-btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 10px; color: #fff; }
.dl-app { background: #4CAF50; }
.dl-shizuku { background: #2196F3; }
.dl-btn:hover { opacity: 0.9; }
.info { margin-top: 16px; padding: 12px; background: #0f3460; border-radius: 8px; font-size: 12px; color: #888; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <h1>UberAutoAccept</h1>
  <p class="subtitle">인증된 사용자만 다운로드 가능합니다</p>
  <p class="subtitle" id="version-info" style="color:#4CAF50; font-size:14px; margin-top:8px;">버전 확인 중...</p>

  <div id="auth-form">
    <label>전화번호</label>
    <input type="tel" id="phone" placeholder="01012345678" inputmode="numeric">

    <label>비밀번호</label>
    <input type="password" id="password" placeholder="비밀번호 입력">

    <button id="verify-btn" onclick="verify()">인증 후 다운로드</button>
    <p class="msg" id="msg"></p>
  </div>

  <div class="downloads" id="downloads">
    <a class="dl-btn dl-app" id="app-link" href="#">UberAutoAccept 다운로드</a>
    <a class="dl-btn dl-shizuku" id="shizuku-link" href="#">Shizuku 다운로드</a>
    <div class="info">
      <b>설치 순서:</b><br>
      1. Shizuku 먼저 설치 → 실행 → 활성화<br>
      2. UberAutoAccept 설치 → 실행 → 인증<br>
      3. 접근성 서비스 활성화
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://czqnybgoaeihwvgdtvgn.supabase.co';
const SUPABASE_ANON_KEY = atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1ONmNXNTVZbWR2WVdWcGFIZDJaMlIwZG1kdUlpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTlRZeE16TXdNVFFzSW1WNGNDSTZNakEzTVRjd09UQXhOSDAud1JzcWtPZmc0VzRKb3lRWldEZnpQcFdUV0dhLXNDMHlySmdCT1R4Tklobw==');

async function verify() {
  const phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('verify-btn');

  msg.className = 'msg';
  msg.textContent = '';

  if (phone.length < 10) {
    msg.className = 'msg err';
    msg.textContent = '올바른 전화번호를 입력하세요';
    return;
  }

  if (!password) {
    msg.className = 'msg err';
    msg.textContent = '비밀번호를 입력하세요';
    return;
  }

  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_download_url_by_phone`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY
      },
      body: JSON.stringify({
        p_phone: phone,
        p_password: password
      })
    });

    const data = await res.json();

    if (!res.ok || !data.allowed) {
      msg.className = 'msg err';
      msg.textContent = data.message || '인증에 실패했습니다';
      btn.disabled = false;
      btn.textContent = '인증 후 다운로드';
      return;
    }

    if (!data.has_update) {
      msg.className = 'msg ok';
      msg.textContent = '현재 배포된 버전이 없습니다';
      btn.disabled = false;
      btn.textContent = '인증 후 다운로드';
      return;
    }

    // 성공 — 다운로드 링크 표시
    document.getElementById('auth-form').style.display = 'none';
    const downloads = document.getElementById('downloads');
    downloads.style.display = 'block';

    const appLink = document.getElementById('app-link');
    appLink.href = data.app_url;
    appLink.textContent = `UberAutoAccept v${data.latest_version} 다운로드`;

    if (data.shizuku_url) {
      document.getElementById('shizuku-link').href = data.shizuku_url;
    } else {
      document.getElementById('shizuku-link').style.display = 'none';
    }

  } catch (e) {
    msg.className = 'msg err';
    msg.textContent = '서버 오류: ' + e.message;
    btn.disabled = false;
    btn.textContent = '인증 후 다운로드';
  }
}

document.getElementById('password').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') verify();
});

async function loadVersion() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/apk_releases?order=created_at.desc&limit=1&select=version_name,created_at`, {
      headers: { 'apikey': SUPABASE_ANON_KEY }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      const v = data[0].version_name;
      const date = new Date(data[0].created_at).toLocaleDateString('ko-KR');
      document.getElementById('version-info').textContent = `최신 버전: v${v} (${date})`;
    } else {
      document.getElementById('version-info').textContent = '';
    }
  } catch (e) {
    document.getElementById('version-info').textContent = '';
  }
}

loadVersion();
</script>
</body>
</html>
